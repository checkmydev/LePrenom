<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>LePrenom</title>
</head>
<body>

    <span id="who"></span>
  </header>

  <main>
    <section id="screen-accueil" class="screen"></section>
    <section id="screen-jeu" class="screen hidden"></section>
    <section id="screen-duel" class="screen hidden"></section>
    <section id="screen-dashboard" class="screen hidden"></section>
    <section id="screen-favoris" class="screen hidden"></section>

    <a href="#jeu">🎮 Jeu</a>
    <a href="#duel">⚔️ Duel</a>

    <a href="#favoris">❤️ Favoris</a>
  </nav>

  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>

</html>
